# 在仓库根目录执行：
#   docker compose --env-file /opt/personal-hub/.env -f deploy/docker-compose.yml up -d --build
#
# 构建上下文为仓库根目录；本文件位于 deploy/

name: personal-hub

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-personal_hub}
      MYSQL_USER: ${MYSQL_USER:-al_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    image: personal-hub-backend:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-personal_hub}
      MYSQL_USER: ${MYSQL_USER:-al_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      STORAGE_LOCATION: ${STORAGE_LOCATION:-/data/personal-hub/uploads}
      STORAGE_MAX_SIZE: ${STORAGE_MAX_SIZE:-104857600}
      LOG_PATH: ${LOG_PATH:-/data/personal-hub/logs}
    volumes:
      - /data/personal-hub/uploads:/data/personal-hub/uploads
      - /data/personal-hub/logs:/data/personal-hub/logs
    expose:
      - "8080"

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
    image: personal-hub-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
