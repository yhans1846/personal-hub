name: Deploy (self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: personal-hub-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure data directories
        run: |
          sudo mkdir -p /data/personal-hub/uploads /data/personal-hub/logs
          # 容器内应用用户可写即可，避免 world-writable
          sudo chmod 775 /data/personal-hub/uploads /data/personal-hub/logs

      - name: Deploy with Docker Compose
        env:
          ENV_FILE: /opt/personal-hub/.env
        run: |
          if [ ! -f "$ENV_FILE" ]; then
            echo "缺少 $ENV_FILE，请先按 docs/DEPLOYMENT.md 创建并填写密钥"
            exit 1
          fi
          docker compose --env-file "$ENV_FILE" -f deploy/docker-compose.yml up -d --build

      - name: Wait for HTTP
        run: |
          set -a
          # shellcheck disable=SC1091
          . /opt/personal-hub/.env
          set +a
          PORT="${HTTP_PORT:-80}"
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null "http://127.0.0.1:${PORT}/"; then
              echo "Frontend OK (port ${PORT})"
              exit 0
            fi
            echo "等待服务就绪… (${i}/60)"
            sleep 5
          done
          echo "健康检查超时"
          docker compose --env-file /opt/personal-hub/.env -f deploy/docker-compose.yml logs --tail=100
          exit 1
