# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/personal_hub?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: al_user
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 10000

  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 8
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 开发环境打印 SQL
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT
jwt:
  secret: personal-hub-jwt-secret-key-2026-please-change-in-production
  expiration: 86400000

# 文件存储 / 登录限流 / 日志
personal-hub:
  security:
    login-rate-limit:
      max-attempts: 30
      window-seconds: 60
  storage:
    location: D:/PersonalHub/uploads
    max-size: 52428800

logging:
  file:
    path: ${LOG_PATH:logs}

# SpringDoc（仅 dev 开启）
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true