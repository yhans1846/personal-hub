server:
  port: 8080

spring:
  application:
    name: personal-hub

  # 默认激活 dev 环境
  profiles:
    active: dev

  # Jackson 日期格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # 文件上传
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

# MyBatis-Plus 公共配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.personalhub.**.entity
  global-config:
    db-config:
      id-type: AUTO
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# SpringDoc OpenAPI 配置（默认关闭，仅在 dev 环境开启）
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 日志目录（Logback 按天滚动，保留 30 天，见 logback-spring.xml）
logging:
  file:
    path: ${LOG_PATH:logs}
