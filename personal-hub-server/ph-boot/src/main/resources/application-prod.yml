# 生产环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/personal_hub?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:personal_hub}
    password: ${DB_PASSWORD:change-me}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT（生产必须更换密钥）
jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-random-string}
  expiration: 86400000

# 文件存储（Linux 服务器路径）
personal-hub:
  storage:
    location: /data/personal-hub/uploads
    max-size: 104857600
