# 生产环境配置（支持环境变量覆盖，便于 Docker / CI 部署）
# 敏感项无默认值：缺失时由 ProdSecretsValidator 拒绝启动
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:personal_hub}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:al_user}
    password: ${MYSQL_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
      timeout: 3000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # Actuator：仅暴露健康检查（供 Docker HEALTHCHECK）
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT（生产必须通过环境变量设置密钥，长度 ≥ 32）
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# 登录限流
personal-hub:
  security:
    login-rate-limit:
      max-attempts: ${LOGIN_RATE_LIMIT_MAX:10}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW:60}
  storage:
    location: ${STORAGE_LOCATION:/data/personal-hub/uploads}
    max-size: ${STORAGE_MAX_SIZE:104857600}
